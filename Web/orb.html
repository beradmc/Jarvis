<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jarvis</title>
  <link rel="stylesheet" href="orb.css">
</head>
<body>

  <!-- ═══ COMPACT MODE — floating glass orb ══════════════════════ -->
  <div id="orb-compact">
    <div id="orb-stage">
      <!-- Layer 0: soft outer bloom -->
      <div id="orb-bloom"></div>
      <!-- Layer 1: subtle outer ring -->
      <div id="orb-outer-ring"></div>
      <!-- Layer 2: bright caustic rim (light concentrating at edge) -->
      <div id="orb-rim"></div>
      <!-- Layer 3: dark glass sphere body -->
      <div id="orb-core">
        <!-- Internal spectral caustic (refracted light inside) -->
        <div id="orb-caustic"></div>
        <!-- Secondary faint caustic for depth -->
        <div id="orb-caustic-2"></div>
      </div>
      <!-- Layer 4: sharp glossy surface reflection -->
      <div id="orb-reflection"></div>
      <!-- Layer 5: soft surface shimmer -->
      <div id="orb-shimmer"></div>
    </div>
  </div>

  <!-- ═══ FULLSCREEN MODE — Siri-style conversation ═════════════════ -->
  <div id="jarvis-fullscreen">

    <!-- Subtle close button (top-right, minimal) -->
    <button id="fs-close" title="Back to orb (Esc)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>

    <!-- Conversation feed -->
    <div id="fs-conversation"></div>

    <!-- Bottom input pill -->
    <div id="fs-input-pill">
      <!-- Left: sparkle / tools icon -->
      <button id="fs-tools" class="fs-pill-icon" title="Tools">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>
        </svg>
      </button>

      <!-- Center: text input (no border, transparent) -->
      <input id="fs-input" type="text" placeholder="Ask Jarvis…" autocomplete="off">

      <!-- Right: mic icon (toggles to keyboard in voice mode) -->
      <button id="fs-mode-icon" class="fs-pill-icon" title="Switch to voice">
        <!-- Mic icon (shown in text mode) -->
        <svg id="icon-mic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="8" y1="22" x2="16" y2="22"/>
        </svg>
        <!-- Keyboard icon (shown in voice mode) -->
        <svg id="icon-keyboard" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M6 12h.01M10 12h.01M14 12h.01M18 12h.01M6 16h12"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="orb.js"></script>
</body>
</html>
