<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jarvis</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="jarvis-overlay">

    <!-- ═══ Centered Assistant UI ═══════════════════════════════ -->
    <div id="assistant-container">

      <!-- Input bar -->
      <div id="input-bar">
        <button id="btn-sparkle" class="bar-btn" title="Sparkle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l1.5 4.5L18 8l-4.5 1.5L12 14l-1.5-4.5L6 8l4.5-1.5z"/>
            <path d="M5 16l1 3 3 1-3 1-1 3-1-3-3-1 3-1z"/>
          </svg>
        </button>
        <input id="chat-input" type="text" placeholder="Ask Jarvis anything..." autocomplete="off" />
        <button id="btn-mic" class="bar-btn" title="Voice input">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <button id="btn-send" class="bar-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>

      <!-- Conversation area -->
      <div id="conversation"></div>

      <!-- Quick toggles (shown when no conversation) -->
      <div id="quick-toggles">
        <button class="toggle-btn" data-action="wifi">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.5a10 10 0 0 1 14 0M8 15.5a6 6 0 0 1 8 0M11 18.5a2 2 0 0 1 2 0"/>
          </svg>
          <span>Wi-Fi</span>
        </button>
        <button class="toggle-btn" data-action="bluetooth">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"/>
          </svg>
          <span>Bluetooth</span>
        </button>
        <button class="toggle-btn" data-action="airplane">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12h20M2 12l4-4m-4 4l4 4"/>
          </svg>
          <span>Airplane</span>
        </button>
        <button class="toggle-btn" data-action="dnd">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22c5.5 0 10-4.5 10-10S17.5 2 12 2 2 6.5 2 12s4.5 10 10 10z"/>
            <line x1="4.9" y1="4.9" x2="19.1" y2="19.1"/>
          </svg>
          <span>Focus</span>
        </button>
        <button class="toggle-btn" data-action="flashlight">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/>
            <path d="M9 18h6"/>
            <path d="M10 22h4"/>
          </svg>
          <span>Flashlight</span>
        </button>
        <button class="toggle-btn" data-action="calculator">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="2" width="16" height="20" rx="2"/>
            <path d="M8 6h8M8 10h2M14 10h2M8 14h2M14 14h2M8 18h2M14 18h2"/>
          </svg>
          <span>Calculator</span>
        </button>
      </div>
    </div>

    <!-- ═══ Close hint (bottom center) ════════════════════════════ -->
    <div id="close-hint">
      <span>Press <kbd>Esc</kbd> or click outside to close</span>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
